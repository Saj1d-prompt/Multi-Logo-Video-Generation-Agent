services:
  video-agent:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: multi-brand-video-agent

    env_file:
      - .env

    ports:
      - "8001:8000"

    volumes:
      - ./credentials:/app/credentials:ro
      - ./workspace:/app/workspace

    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest

    container_name: multi-brand-n8n

    ports:
      - "5678:5678"

    environment:
      TZ: Asia/Dhaka
      GENERIC_TIMEZONE: Asia/Dhaka
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"

    volumes:
      - n8n_data:/home/node/.n8n

    depends_on:
      - video-agent

    restart: unless-stopped

volumes:
  n8n_data: