services:
  video-agent:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: multi-logo-video-agent

    env_file:
      - .env

    ports:
      - "8002:8000"

    volumes:
      - ./credentials:/app/credentials:ro
      - ./workspace:/app/workspace

    networks:
      - video-automation-network

    restart: unless-stopped

networks:
  video-automation-network:
    external: true